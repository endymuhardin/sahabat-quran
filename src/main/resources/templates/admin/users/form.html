<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/layout}">
<head>
    <title>User Form</title>
</head>
<body>
    <div layout:fragment="content">
        <h1 th:text="${user.id == null} ? 'Add User' : 'Edit User'"></h1>
        <form id="user-form" th:action="${user.id == null} ? '/admin/users/add' : '/admin/users/edit/' + ${user.id}" th:object="${user}" method="post">
            <div>
                <label for="username">Username:</label>
                <input type="text" id="username" th:field="*{username}" />
            </div>
            <div>
                <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" th:field="*{fullname}" />
            </div>
            <div>
                <label for="email">Email:</label>
                <input type="email" id="email" th:field="*{email}" />
            </div>
            <div>
                <label for="role">Role:</label>
                <select id="role" th:field="*{role}">
                    <option th:each="role : ${roles}" th:value="${role.id}" th:text="${role.name}"></option>
                </select>
            </div>
            <div>
                <label for="active">Active:</label>
                <input type="checkbox" id="active" th:field="*{active}" />
            </div>
            <div>
                <button type="submit" id="save-button">Save</button>
            </div>
        </form>
    </div>
</body>
</html>
